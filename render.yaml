services:
  - type: web
    name: fenix-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: fenix-super-secret-key-2024
      - key: DATABASE_URL
        sync: false
